<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATY - Matiční AI Pomocník</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #f0f2f5;
        }

        body {
            display: flex;
            align-items: stretch;
            justify-content: stretch;
        }

        #chatFrame {
            border: 0;
            width: 100%;
            height: 100%;
        }

        .noscript {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 24px;
        }

        .noscript a {
            color: #5B6FE8;
        }
    </style>
</head>
<body>
    <iframe
        id="chatFrame"
        src="chat.html"
        title="MATY - Chatbot"
        loading="eager"
        aria-label="MATY chatbot"
    ></iframe>
    <noscript>
        <div class="noscript">
            Pro zobrazení chatbota je potřeba JavaScript. Otevři prosím
            <a href="chat.html">chatbota zde</a>.
        </div>
    </noscript>
</body>
</html>
